<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --muted: #888;
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.12);
    --accent: #c8ff57;
    --accent-dim: rgba(200,255,87,0.1);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 720px; margin: 0 auto; }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 2rem;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .header h1 span { color: var(--accent); }
  .month-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 2rem;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem;
  }
  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.accent { color: var(--accent); }

  /* Form */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.5rem;
    margin-bottom: 2rem;
  }
  .form-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 1.25rem;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  .form-grid3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .field input, .field select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus {
    border-color: var(--accent);
  }
  .field select option { background: #222; }

  .type-toggle {
    display: flex;
    background: var(--surface2);
    border-radius: 10px;
    border: 1px solid var(--border2);
    padding: 3px;
    gap: 3px;
  }
  .type-btn {
    flex: 1;
    padding: 7px;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }
  .type-btn.active-income { background: var(--green-dim); color: var(--green); }
  .type-btn.active-expense { background: var(--red-dim); color: var(--red); }

  .submit-btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:active { transform: scale(0.98); }

  /* Filter tabs */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #0f0f0f; border-color: var(--accent); font-weight: 600; }

  /* Transactions */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .tx-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 2rem; }

  .tx {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    transition: border-color 0.2s;
    animation: fadeIn 0.25s ease;
  }
  .tx:hover { border-color: var(--border2); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .tx-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .tx-body { flex: 1; min-width: 0; }
  .tx-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tx-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .tx-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .tx-amount {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
  }
  .tx-amount.income { color: var(--green); }
  .tx-amount.expense { color: var(--red); }
  .tx-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 2px 4px;
    transition: color 0.2s;
  }
  .tx-del:hover { color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 2.5rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    border: 1px dashed var(--border2);
    border-radius: 16px;
  }

  /* Chart */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.5rem;
  }
  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.25rem;
  }
  .chart-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .bar-cat {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    width: 72px;
    text-align: right;
    flex-shrink: 0;
  }
  .bar-track {
    flex: 1;
    background: var(--surface2);
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .bar-amt {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    width: 70px;
    flex-shrink: 0;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: #0f0f0f;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    z-index: 100;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .stats .stat:last-child { grid-column: span 2; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid3 { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>Expenses<span>.</span></h1>
    <div class="month-label" id="month-label"></div>
  </div>

  <!-- Summary Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Income</div>
      <div class="stat-value green" id="total-income">₹0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Expenses</div>
      <div class="stat-value red" id="total-expense">₹0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Balance</div>
      <div class="stat-value accent" id="balance">₹0</div>
    </div>
  </div>

  <!-- Add Transaction Form -->
  <div class="form-card">
    <div class="form-title">Add Transaction</div>
    <div class="form-grid">
      <div class="field">
        <label>Description</label>
        <input type="text" id="desc" placeholder="e.g. Lunch, Salary...">
      </div>
      <div class="field">
        <label>Amount (₹)</label>
        <input type="number" id="amount" placeholder="0" min="0">
      </div>
    </div>
    <div class="form-grid3">
      <div class="field">
        <label>Type</label>
        <div class="type-toggle">
          <button class="type-btn active-expense" id="btn-expense" onclick="setType('expense')">Expense</button>
          <button class="type-btn" id="btn-income" onclick="setType('income')">Income</button>
        </div>
      </div>
      <div class="field">
        <label>Category</label>
        <select id="category">
          <option>Food</option>
          <option>Transport</option>
          <option>Shopping</option>
          <option>Bills</option>
          <option>Salary</option>
          <option>Health</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="date">
      </div>
    </div>
    <button class="submit-btn" onclick="addTransaction()">+ Add Transaction</button>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('income', this)">Income</button>
    <button class="filter-btn" onclick="setFilter('expense', this)">Expense</button>
    <button class="filter-btn" onclick="setFilter('Food', this)">Food</button>
    <button class="filter-btn" onclick="setFilter('Transport', this)">Transport</button>
    <button class="filter-btn" onclick="setFilter('Shopping', this)">Shopping</button>
    <button class="filter-btn" onclick="setFilter('Bills', this)">Bills</button>
  </div>

  <div class="section-label" id="tx-count">Transactions</div>
  <div class="tx-list" id="tx-list"></div>

  <!-- Category Chart -->
  <div class="chart-card">
    <div class="chart-header">
      <div class="chart-title">Expense by category</div>
    </div>
    <div id="cat-chart"></div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── Config ──────────────────────────────────────────────
  const CAT_COLORS = {
    Food: '#4ade80',
    Transport: '#60a5fa',
    Shopping: '#f472b6',
    Bills: '#fbbf24',
    Salary: '#c8ff57',
    Health: '#34d399',
    Other: '#94a3b8'
  };
  const CAT_EMOJI = {
    Food: '🍱', Transport: '🚌', Shopping: '🛍️',
    Bills: '📄', Salary: '💼', Health: '💊', Other: '📦'
  };

  // ── State ────────────────────────────────────────────────
  let transactions = JSON.parse(localStorage.getItem('Expenses_txns') || '[]');
  let activeFilter = 'all';
  let selectedType = 'expense';
  let nextId = parseInt(localStorage.getItem('kharcha_nextid') || '1');

  // ── Init ─────────────────────────────────────────────────
  document.getElementById('date').value = new Date().toISOString().split('T')[0];
  document.getElementById('month-label').textContent = new Date().toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });

  // If first time, add sample data
  if (transactions.length === 0) {
    const today = new Date().toISOString().split('T')[0];
    transactions = [
      { id: nextId++, desc: 'Monthly Salary', amount: 50000, type: 'income', category: 'Salary', date: today },
      { id: nextId++, desc: 'Grocery shopping', amount: 1800, type: 'expense', category: 'Food', date: today },
      { id: nextId++, desc: 'Metro recharge', amount: 500, type: 'expense', category: 'Transport', date: today },
      { id: nextId++, desc: 'Electricity bill', amount: 1200, type: 'expense', category: 'Bills', date: today },
    ];
    save();
  }

  // ── Helpers ──────────────────────────────────────────────
  function fmt(n) {
    return '₹' + Math.abs(Math.round(n)).toLocaleString('en-IN');
  }

  function save() {
    localStorage.setItem('Expenses_txns', JSON.stringify(transactions));
    localStorage.setItem('Expenses_nextid', nextId);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ── Type Toggle ──────────────────────────────────────────
  function setType(type) {
    selectedType = type;
    const btnE = document.getElementById('btn-expense');
    const btnI = document.getElementById('btn-income');
    btnE.className = 'type-btn' + (type === 'expense' ? ' active-expense' : '');
    btnI.className = 'type-btn' + (type === 'income' ? ' active-income' : '');
    // Auto-set category
    const cat = document.getElementById('category');
    if (type === 'income') cat.value = 'Salary';
    else cat.value = 'Food';
  }

  // ── Filter ───────────────────────────────────────────────
  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  // ── Add Transaction ──────────────────────────────────────
  function addTransaction() {
    const desc = document.getElementById('desc').value.trim();
    const amount = parseFloat(document.getElementById('amount').value);
    const category = document.getElementById('category').value;
    const date = document.getElementById('date').value;

    if (!desc) { showToast('Description likhna zaroori hai!'); return; }
    if (!amount || amount <= 0) { showToast('Valid amount daalo!'); return; }
    if (!date) { showToast('Date select karo!'); return; }

    transactions.unshift({ id: nextId++, desc, amount, type: selectedType, category, date });
    save();

    document.getElementById('desc').value = '';
    document.getElementById('amount').value = '';
    showToast('Transaction add ho gaya!');
    render();
  }

  // ── Delete Transaction ───────────────────────────────────
  function deleteTransaction(id) {
    transactions = transactions.filter(t => t.id !== id);
    save();
    render();
  }

  // ── Render ───────────────────────────────────────────────
  function render() {
    // Stats (always from all transactions)
    const income = transactions
      .filter(t => t.type === 'income')
      .reduce((sum, t) => sum + t.amount, 0);

    const expense = transactions
      .filter(t => t.type === 'expense')
      .reduce((sum, t) => sum + t.amount, 0);

    const balance = income - expense;

    document.getElementById('total-income').textContent = fmt(income);
    document.getElementById('total-expense').textContent = fmt(expense);
    const balEl = document.getElementById('balance');
    balEl.textContent = (balance < 0 ? '-' : '') + fmt(balance);
    balEl.className = 'stat-value ' + (balance >= 0 ? 'accent' : 'red');

    // Filter transactions
    const filtered = transactions.filter(t => {
      if (activeFilter === 'all') return true;
      if (activeFilter === 'income' || activeFilter === 'expense') return t.type === activeFilter;
      return t.category === activeFilter;
    });

    document.getElementById('tx-count').textContent = filtered.length + ' transaction' + (filtered.length !== 1 ? 's' : '');

    // Transaction list
    const list = document.getElementById('tx-list');
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state">Koi transaction nahi mila</div>';
    } else {
      list.innerHTML = filtered.map(t => `
        <div class="tx">
          <div class="tx-icon" style="background:${CAT_COLORS[t.category]}22;">
            <span style="font-size:18px;">${CAT_EMOJI[t.category] || '📦'}</span>
          </div>
          <div class="tx-body">
            <div class="tx-name">${t.desc}</div>
            <div class="tx-meta">${t.category} &middot; ${t.date}</div>
          </div>
          <div class="tx-right">
            <div class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</div>
            <button class="tx-del" onclick="deleteTransaction(${t.id})" title="Delete">×</button>
          </div>
        </div>
      `).join('');
    }

    // Category chart
    const catTotals = {};
    transactions
      .filter(t => t.type === 'expense')
      .forEach(t => {
        catTotals[t.category] = (catTotals[t.category] || 0) + t.amount;
      });

    const maxVal = Math.max(...Object.values(catTotals), 1);
    const chartEl = document.getElementById('cat-chart');

    if (Object.keys(catTotals).length === 0) {
      chartEl.innerHTML = '<div style="font-size:12px;color:var(--muted);font-family:DM Mono,monospace;text-align:center;padding:1rem;">Koi expense nahi abhi</div>';
    } else {
      chartEl.innerHTML = Object.entries(catTotals)
        .sort((a, b) => b[1] - a[1])
        .map(([cat, val]) => `
          <div class="bar-row">
            <div class="bar-cat">${cat}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${Math.round(val / maxVal * 100)}%;background:${CAT_COLORS[cat] || '#888'}"></div>
            </div>
            <div class="bar-amt">${fmt(val)}</div>
          </div>
        `).join('');
    }
  }

  // Initial render
  render();

  // Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement.tagName === 'INPUT') {
      addTransaction();
    }
  });
</script>
</body>
</html>
